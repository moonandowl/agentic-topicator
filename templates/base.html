<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Agentic Topicator{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 1rem 2rem; max-width: 900px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    input, select, textarea, button { font-size: 1rem; padding: 0.5rem; margin: 0.25rem 0; }
    button { cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 6px; padding: 0.5rem 1rem; }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    .error { color: #dc2626; }
    label { display: block; font-weight: 500; margin-top: 0.5rem; }
    a { color: #2563eb; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
